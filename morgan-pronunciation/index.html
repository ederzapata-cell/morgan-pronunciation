<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Morgan Speaking</title>

  <style>
    :root {
      --blue-main: #0096E1;
      --blue-deep: #0B3A64;
      --blue-soft: #7FA1E6;
      --blue-light: #C9D5EE;
      --card-bg: rgba(255, 255, 255, 0.94);
      --bubble-bg: #f4f8fd;
      --text-dark: #18324a;
      --text-soft: #4f6580;
      --text-muted: #7a8ea7;
      --success: #23b26d;
      --danger: #d9534f;
      --shadow-lg: 0 22px 48px rgba(7, 36, 74, 0.16);
      --shadow-md: 0 10px 24px rgba(7, 36, 74, 0.10);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.35), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.18), transparent 28%),
        linear-gradient(180deg, var(--blue-soft), var(--blue-light));
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: var(--card-bg);
      border-radius: var(--radius-xl);
      padding: 20px 18px 16px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 155px;
      background: linear-gradient(180deg, rgba(0,150,225,0.14), rgba(0,150,225,0));
      pointer-events: none;
    }

    .hero {
      position: relative;
      z-index: 1;
      margin-bottom: 10px;
    }

    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    .avatar {
      width: 168px;
      max-width: 70%;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 10px 20px rgba(10, 48, 92, 0.14));
    }

    .avatar img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-size: 31px;
      line-height: 1.05;
      color: var(--text-dark);
      letter-spacing: -0.5px;
    }

    .subtitle {
      max-width: 300px;
      margin: 8px auto 14px;
      font-size: 14px;
      line-height: 1.45;
      color: var(--text-soft);
    }

    .status-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(0, 150, 225, 0.10);
      color: var(--text-dark);
      font-weight: bold;
      font-size: 14px;
      box-shadow: inset 0 0 0 1px rgba(0, 150, 225, 0.08);
    }

    .live-indicator {
      display: none;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(35, 178, 109, 0.12);
      color: var(--success);
      font-weight: bold;
      font-size: 14px;
      box-shadow: inset 0 0 0 1px rgba(35, 178, 109, 0.12);
    }

    .conversation-panel {
      position: relative;
      z-index: 1;
      margin-top: 4px;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(246,250,255,0.95));
      border-radius: 24px;
      padding: 12px;
      box-shadow: inset 0 0 0 1px rgba(17, 76, 128, 0.06);
    }

    .bubble-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.2px;
      color: var(--text-soft);
    }

    .bubble-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--blue-main);
      box-shadow: 0 0 0 4px rgba(0, 150, 225, 0.10);
      flex-shrink: 0;
    }

    .transcript {
      margin-top: 0;
      padding: 16px 16px 18px;
      border-radius: 20px;
      background: var(--bubble-bg);
      min-height: 108px;
      text-align: left;
      font-size: 15px;
      line-height: 1.55;
      color: var(--text-dark);
      white-space: pre-wrap;
      box-shadow: inset 0 0 0 1px rgba(17, 76, 128, 0.05);
    }

    .controls {
      margin-top: 14px;
      position: relative;
      z-index: 1;
    }

    .btn {
      width: 100%;
      padding: 16px 18px;
      background: linear-gradient(180deg, #16a4ea, var(--blue-main));
      color: white;
      border: none;
      border-radius: 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(0, 150, 225, 0.28);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(0, 150, 225, 0.30);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: 0 8px 18px rgba(0, 150, 225, 0.18);
    }

    .hidden {
      display: none !important;
    }

    .helper-text {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .footer {
      margin-top: 14px;
      font-size: 11px;
      color: #7f90a4;
      line-height: 1.3;
    }

    .footer img {
      width: 90px;
      margin-top: 6px;
      opacity: 0.9;
    }

    @media (max-width: 480px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 18px 16px 14px;
        border-radius: 26px;
      }

      .avatar {
        width: 154px;
      }

      h1 {
        font-size: 28px;
      }

      .subtitle {
        font-size: 13px;
      }

      .transcript {
        font-size: 14px;
        min-height: 102px;
      }

      .btn {
        font-size: 15px;
      }

      .footer img {
        width: 84px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="hero">
      <div class="avatar-wrap">
        <div class="avatar">
          <img src="morgan-avatar-headset.png" alt="Morgan Avatar">
        </div>
      </div>

      <h1>Morgan Speaking</h1>

      <div class="subtitle">
        Speak naturally and improve your English in real time
      </div>

      <div class="status-row">
        <div id="status" class="status">Status: idle</div>
        <div id="liveIndicator" class="live-indicator">Morgan is listening... 🎤</div>
      </div>
    </div>

    <div class="conversation-panel">
      <div class="bubble-label">
        <span class="bubble-dot"></span>
        <span>Morgan</span>
      </div>

      <div id="transcript" class="transcript">
        Tap Start Speaking and say hello to Morgan.
      </div>
    </div>

    <div class="controls">
      <button id="startBtn" class="btn">Start Speaking</button>

      <div class="helper-text">
        Tap the button and start practicing with Morgan.
      </div>
    </div>

    <div class="footer">
      by Private English<br>
      <img src="private-english-logo.png" alt="Private English Logo">
    </div>
  </div>

  <script>
    let pc = null;
    let dc = null;
    let localStream = null;
    let remoteAudioEl = null;
    let transcript = "";
    let isStarting = false;
    let isConnected = false;

    const startBtn = document.getElementById("startBtn");
    const statusEl = document.getElementById("status");
    const transcriptEl = document.getElementById("transcript");
    const liveIndicator = document.getElementById("liveIndicator");

    function setStatus(text) {
      statusEl.innerText = text;
    }

    function updateTranscript(text) {
      transcriptEl.innerText = text;
    }

    function hideStartButton() {
      startBtn.disabled = true;
      startBtn.classList.add("hidden");
      liveIndicator.style.display = "block";
    }

    function showStartButton() {
      startBtn.disabled = false;
      startBtn.classList.remove("hidden");
      liveIndicator.style.display = "none";
    }

    async function cleanupSession() {
      try {
        if (dc) {
          dc.onopen = null;
          dc.onmessage = null;
          try { dc.close(); } catch (_) {}
          dc = null;
        }

        if (pc) {
          pc.ontrack = null;
          pc.onconnectionstatechange = null;
          try { pc.close(); } catch (_) {}
          pc = null;
        }

        if (localStream) {
          localStream.getTracks().forEach(track => {
            try { track.stop(); } catch (_) {}
          });
          localStream = null;
        }

        if (remoteAudioEl) {
          try {
            remoteAudioEl.pause();
            remoteAudioEl.srcObject = null;
            remoteAudioEl.remove();
          } catch (_) {}
          remoteAudioEl = null;
        }
      } catch (_) {}
    }

    async function startMorgan() {
      if (isStarting || isConnected) return;

      isStarting = true;
      hideStartButton();
      setStatus("Connecting...");
      updateTranscript("Morgan is getting ready...");

      try {
        await cleanupSession();
        transcript = "";

        const tokenRes = await fetch("/.netlify/functions/session");
        const tokenData = await tokenRes.json();

        if (!tokenRes.ok || !tokenData.value) {
          throw new Error(JSON.stringify(tokenData));
        }

        const EPHEMERAL_KEY = tokenData.value;

        pc = new RTCPeerConnection();

        remoteAudioEl = document.createElement("audio");
        remoteAudioEl.autoplay = true;
        remoteAudioEl.playsInline = true;
        document.body.appendChild(remoteAudioEl);

        pc.ontrack = (e) => {
          if (remoteAudioEl.srcObject !== e.streams[0]) {
            remoteAudioEl.srcObject = e.streams[0];
          }
        };

        pc.onconnectionstatechange = async () => {
          if (!pc) return;

          if (
            pc.connectionState === "failed" ||
            pc.connectionState === "disconnected" ||
            pc.connectionState === "closed"
          ) {
            await cleanupSession();
            isStarting = false;
            isConnected = false;
            setStatus("Disconnected");
            updateTranscript("Connection closed.");
            showStartButton();
          }
        };

        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        dc = pc.createDataChannel("oai-events");

        dc.onopen = () => {
          setStatus("Connected 🎤");
          isStarting = false;
          isConnected = true;
          updateTranscript("Morgan is listening...");
        };

        dc.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            console.log("Realtime event:", msg);

            if (msg.type === "response.output_audio_transcript.delta" && msg.delta) {
              transcript += msg.delta;
              updateTranscript(transcript);
            }

            if (msg.type === "response.output_audio_transcript.done" && msg.transcript) {
              transcript = msg.transcript;
              updateTranscript(transcript);
            }

            if (msg.type === "error") {
              console.error("Realtime error event:", msg);
              setStatus("Error ❌");
              updateTranscript(msg.error?.message || "OpenAI error");
            }
          } catch (err) {
            console.error("Data channel parse error:", err);
          }
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        const sdpResponse = await fetch("https://api.openai.com/v1/realtime/calls", {
          method: "POST",
          body: offer.sdp,
          headers: {
            Authorization: `Bearer ${EPHEMERAL_KEY}`,
            "Content-Type": "application/sdp"
          }
        });

        const answerSdp = await sdpResponse.text();

        if (!sdpResponse.ok) {
          throw new Error(answerSdp);
        }

        await pc.setRemoteDescription({
          type: "answer",
          sdp: answerSdp
        });

      } catch (err) {
        console.error(err);
        await cleanupSession();
        updateTranscript("Something went wrong");
        setStatus("Error ❌");
        isStarting = false;
        isConnected = false;
        showStartButton();
      }
    }

    startBtn.addEventListener("click", startMorgan);
  </script>
</body>
</html>
