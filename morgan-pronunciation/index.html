<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Morgan Speaking</title>

  <style>
    :root {
      --blue-main: #0096E1;
      --blue-soft: #7FA1E6;
      --blue-light: #C9D5EE;
      --text-dark: #18324a;
      --text-soft: #4f6580;
      --success: #23b26d;
      --danger: #d9534f;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, var(--blue-soft), var(--blue-light));
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.92);
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      text-align: center;
    }

    .avatar {
      width: 140px;
      height: 140px;
      border-radius: 24px;
      overflow: hidden;
      margin: 0 auto 12px;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      color: var(--text-dark);
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-soft);
      margin-bottom: 16px;
    }

    .status {
      margin-bottom: 12px;
      font-weight: bold;
      color: var(--text-dark);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--blue-main);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .hidden {
      display: none !important;
    }

    .live-indicator {
      display: none;
      margin-top: 4px;
      margin-bottom: 12px;
      font-weight: bold;
      color: var(--success);
      font-size: 15px;
    }

    .transcript {
      margin-top: 16px;
      padding: 12px;
      border-radius: 14px;
      background: #f5f8fb;
      min-height: 80px;
      text-align: left;
      font-size: 14px;
      color: var(--text-dark);
      white-space: pre-wrap;
    }

    .footer {
      margin-top: 16px;
      font-size: 12px;
      color: #6b7c8f;
    }

    .footer img {
      width: 140px;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="avatar">
      <img src="morgan-avatar.png" alt="Morgan Avatar">
    </div>

    <h1>Morgan Speaking</h1>

    <div class="subtitle">
      Speak naturally and improve your English in real time
    </div>

    <div id="status" class="status">Status: idle</div>

    <button id="startBtn" class="btn">Start Speaking</button>

    <div id="liveIndicator" class="live-indicator">Morgan is listening... 🎤</div>

    <div id="transcript" class="transcript">
      Morgan will speak here...
    </div>

    <div class="footer">
      Provided by<br>
      <img src="private-english-logo.png" alt="Private English Logo">
    </div>
  </div>

  <script>
    let pc = null;
    let dc = null;
    let localStream = null;
    let remoteAudioEl = null;
    let transcript = "";
    let isStarting = false;
    let isConnected = false;

    const startBtn = document.getElementById("startBtn");
    const statusEl = document.getElementById("status");
    const transcriptEl = document.getElementById("transcript");
    const liveIndicator = document.getElementById("liveIndicator");

    function setStatus(text) {
      statusEl.innerText = text;
    }

    function updateTranscript(text) {
      transcriptEl.innerText = text;
    }

    function hideStartButton() {
      startBtn.disabled = true;
      startBtn.classList.add("hidden");
      liveIndicator.style.display = "block";
    }

    function showStartButton() {
      startBtn.disabled = false;
      startBtn.classList.remove("hidden");
      liveIndicator.style.display = "none";
    }

    async function cleanupSession() {
      try {
        if (dc) {
          dc.onmessage = null;
          try { dc.close(); } catch (_) {}
          dc = null;
        }

        if (pc) {
          pc.ontrack = null;
          try { pc.close(); } catch (_) {}
          pc = null;
        }

        if (localStream) {
          localStream.getTracks().forEach(track => {
            try { track.stop(); } catch (_) {}
          });
          localStream = null;
        }

        if (remoteAudioEl) {
          try {
            remoteAudioEl.pause();
            remoteAudioEl.srcObject = null;
            remoteAudioEl.remove();
          } catch (_) {}
          remoteAudioEl = null;
        }
      } catch (_) {}
    }

    async function startMorgan() {
      if (isStarting || isConnected) return;

      isStarting = true;
      startBtn.disabled = true;
      setStatus("Connecting...");
      updateTranscript("Morgan is getting ready...");

      try {
        await cleanupSession();
        transcript = "";

        const tokenRes = await fetch("/.netlify/functions/session");
        const data = await tokenRes.json();

        if (!data || !data.value) {
          throw new Error("No session token received");
        }

        const key = data.value;

        pc = new RTCPeerConnection();

        remoteAudioEl = document.createElement("audio");
        remoteAudioEl.autoplay = true;
        remoteAudioEl.playsInline = true;
        document.body.appendChild(remoteAudioEl);

        pc.ontrack = (e) => {
          if (remoteAudioEl.srcObject !== e.streams[0]) {
            remoteAudioEl.srcObject = e.streams[0];
          }
        };

        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        dc = pc.createDataChannel("oai-events");

        dc.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);

            if (msg.type === "response.created") {
              transcript = "";
              updateTranscript("Morgan is speaking...");
            }

            if (msg.type === "response.audio_transcript.delta" && msg.delta) {
              transcript += msg.delta;
              updateTranscript(transcript);
            }

            if (msg.type === "response.audio_transcript.done" && msg.transcript) {
              transcript = msg.transcript;
              updateTranscript(transcript);
            }
          } catch (parseErr) {
            console.error("Data channel parse error:", parseErr);
          }
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        const response = await fetch(
          "https://api.openai.com/v1/realtime?model=gpt-realtime-mini",
          {
            method: "POST",
            headers: {
              Authorization: `Bearer ${key}`,
              "Content-Type": "application/sdp"
            },
            body: offer.sdp
          }
        );

        const answer = await response.text();

        if (!answer || !answer.startsWith("v=")) {
          throw new Error("Invalid SDP answer");
        }

        await pc.setRemoteDescription({
          type: "answer",
          sdp: answer
        });

        isStarting = false;
        isConnected = true;
        setStatus("Connected 🎤");
        hideStartButton();
      } catch (err) {
        console.error(err);
        await cleanupSession();
        updateTranscript("Something went wrong");
        setStatus("Error ❌");
        isStarting = false;
        isConnected = false;
        showStartButton();
      }
    }

    startBtn.addEventListener("click", startMorgan);
  </script>
</body>
</html>
