<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Morgan Pronunciation</title>
</head>

<body style="text-align:center; font-family:sans-serif; padding:40px;">

  <h1>🎤 Morgan Pronunciation</h1>

  <button id="startBtn" style="padding:15px 25px; font-size:18px;">
    Start Speaking
  </button>

  <p id="status">Status: idle</p>

  <script>
    let pc;

    async function startMorgan() {
      document.getElementById("status").innerText = "Connecting...";

      try {
        // 1. Obtener token efímero desde Netlify
        const tokenResponse = await fetch("/.netlify/functions/session");
        const data = await tokenResponse.json();

        const EPHEMERAL_KEY = data.value;

        // 2. Crear conexión WebRTC
        pc = new RTCPeerConnection();

        // 3. Audio remoto (voz de Morgan)
        const audio = document.createElement("audio");
        audio.autoplay = true;
        pc.ontrack = e => audio.srcObject = e.streams[0];

        // 4. Micrófono
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(track => pc.addTrack(track, stream));

        // 5. Crear oferta SDP
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        // 6. Enviar SDP a OpenAI (FORMA CORRECTA)
        const response = await fetch(
          "https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview",
          {
            method: "POST",
            headers: {
              Authorization: `Bearer ${EPHEMERAL_KEY}`,
              "Content-Type": "application/sdp"
            },
            body: offer.sdp
          }
        );

        const answerSDP = await response.text();

        // 🔴 Validación clave (evita error v=)
        if (!answerSDP.startsWith("v=")) {
          throw new Error("Respuesta inválida del servidor:\n" + answerSDP);
        }

        await pc.setRemoteDescription({
          type: "answer",
          sdp: answerSDP
        });

        document.getElementById("status").innerText = "Connected 🎤";

      } catch (error) {
        console.error(error);
        document.getElementById("status").innerText = "Error ❌";
        alert("Error: " + error.message);
      }
    }

    // Conectar botón
    document.getElementById("startBtn").onclick = startMorgan;
  </script>

</body>
</html>
