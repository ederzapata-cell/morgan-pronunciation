<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Morgan Pronunciation</title>
</head>

<body style="text-align:center; font-family:sans-serif; padding:40px;">

  <h1>🎤 Morgan Pronunciation</h1>

  <button id="startBtn" style="padding:15px 25px; font-size:18px;">
    Start Speaking
  </button>

  <p id="status">Status: idle</p>

  <script>
    async function startMorgan() {
      document.getElementById("status").innerText = "Connecting...";

      try {
        // 1. Obtener token desde Netlify
        const response = await fetch("/.netlify/functions/session");
        const data = await response.json();

        const EPHEMERAL_KEY = data.value;

        // 2. Crear conexión WebRTC
        const pc = new RTCPeerConnection();

        // 3. Audio remoto (voz de Morgan)
        const audio = document.createElement("audio");
        audio.autoplay = true;
        pc.ontrack = e => audio.srcObject = e.streams[0];

        // 4. Micrófono
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(track => pc.addTrack(track, stream));

        // 5. Canal de datos
        const dc = pc.createDataChannel("oai-events");

        // 6. Crear oferta
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        // 7. Enviar a OpenAI
        const baseUrl = "https://api.openai.com/v1/realtime";
        const model = "gpt-4o-realtime-preview";

        const sdpResponse = await fetch(`${baseUrl}?model=${model}`, {
          method: "POST",
          body: offer.sdp,
          headers: {
            Authorization: `Bearer ${EPHEMERAL_KEY}`,
            "Content-Type": "application/sdp"
          },
        });

        const answer = {
          type: "answer",
          sdp: await sdpResponse.text(),
        };

        await pc.setRemoteDescription(answer);

        document.getElementById("status").innerText = "Connected 🎤";

      } catch (error) {
        console.error(error);
        document.getElementById("status").innerText = "Error ❌";
        alert("Error: " + error.message);
      }
    }

    // Conectar botón
    document.getElementById("startBtn").onclick = startMorgan;
  </script>

</body>
</html>
