<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Morgan Speaking</title>

  <style>
    :root {
      --blue-main: #0096E1;
      --blue-soft: #7FA1E6;
      --blue-light: #C9D5EE;
      --text-dark: #18324a;
      --text-soft: #4f6580;
      --success: #23b26d;
      --warning: #e5a100;
      --danger: #d9534f;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, var(--blue-soft), var(--blue-light));
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.92);
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      text-align: center;
    }

    .avatar {
      width: 140px;
      height: 140px;
      border-radius: 24px;
      overflow: hidden;
      margin: 0 auto 12px;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      color: var(--text-dark);
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-soft);
      margin-bottom: 16px;
    }

    .status {
      margin-bottom: 12px;
      font-weight: bold;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--blue-main);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
    }

    .transcript {
      margin-top: 16px;
      padding: 12px;
      border-radius: 14px;
      background: #f5f8fb;
      min-height: 80px;
      text-align: left;
      font-size: 14px;
    }

    .footer {
      margin-top: 16px;
      font-size: 12px;
      color: #6b7c8f;
    }

    .footer img {
      width: 140px;
      margin-top: 6px;
    }

  </style>
</head>

<body>

  <div class="card">

    <div class="avatar">
      <!-- 👇 AQUÍ YA CORREGIDO -->
      <img src="../morgan-avatar.png" alt="Morgan Avatar">
    </div>

    <h1>Morgan Speaking</h1>

    <div class="subtitle">
      Speak naturally and improve your English in real time
    </div>

    <div id="status" class="status">Status: idle</div>

    <button class="btn" onclick="startMorgan()">Start Speaking</button>

    <div id="transcript" class="transcript">
      Morgan will speak here...
    </div>

    <div class="footer">
      Provided by<br>
      <!-- 👇 AQUÍ YA CORREGIDO -->
      <img src="../private-english-logo.png" alt="Private English Logo">
    </div>

  </div>

  <script>
    let pc;
    let dc;
    let transcript = "";

    function setStatus(text) {
      document.getElementById("status").innerText = text;
    }

    function updateTranscript(text) {
      document.getElementById("transcript").innerText = text;
    }

    async function startMorgan() {
      setStatus("Connecting...");
      updateTranscript("Morgan is getting ready...");

      try {
        const tokenRes = await fetch("/.netlify/functions/session");
        const data = await tokenRes.json();

        const key = data.value;

        pc = new RTCPeerConnection();

        const audio = document.createElement("audio");
        audio.autoplay = true;

        pc.ontrack = e => {
          audio.srcObject = e.streams[0];
        };

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        stream.getTracks().forEach(track => pc.addTrack(track, stream));

        dc = pc.createDataChannel("oai-events");

        dc.onmessage = (event) => {
          const msg = JSON.parse(event.data);

          if (msg.type === "response.audio_transcript.delta") {
            transcript += msg.delta;
            updateTranscript(transcript);
          }

          if (msg.type === "response.created") {
            transcript = "";
            updateTranscript("Morgan is speaking...");
          }
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        const response = await fetch(
          "https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview",
          {
            method: "POST",
            headers: {
              Authorization: `Bearer ${key}`,
              "Content-Type": "application/sdp"
            },
            body: offer.sdp
          }
        );

        const answer = await response.text();

        await pc.setRemoteDescription({
          type: "answer",
          sdp: answer
        });

        setStatus("Connected 🎤");

      } catch (err) {
        console.error(err);
        setStatus("Error ❌");
        updateTranscript("Something went wrong");
      }
    }
  </script>

</body>
</html>
